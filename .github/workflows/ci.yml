name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.66.0
          manifest-path: pyproject.toml
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          locked: true

      - name: Run tests
        shell: pwsh
        run: pixi run test

      - name: Smoke-check CPU doctor path
        shell: pwsh
        run: pixi run python -m speech_recognizer.cli doctor --device cpu --compute-type int8

      - name: Smoke-check ROS imports
        shell: pwsh
        run: pixi run python -c "import rclpy; import speech_recognizer.ros2_node; print('ros-import-ok')"
